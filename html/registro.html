<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - VibeStream</title>
    <link rel="icon" href="../icons/icon-site.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/registro.css" />
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="registro-container w-100 d-flex justify-content-center py-4">
        <div class="registro-box text-center">
            <h1>VibeStream 🎧</h1>
            <p>Crie sua conta e entre na vibe</p>

            <form>
                <input type="text" placeholder="Nome completo" required />
                <input type="text" placeholder="Username" required />
                <input type="email" placeholder="E-mail" required />
                <input type="password" placeholder="Senha" required />
                <input type="password" placeholder="Confirme sua senha" required />
                <input type="tel" placeholder="Telefone" required />

                <div class="grupo-botao d-flex gap-2 mt-4">
                    <button type="submit" class="btn-registrar">Registrar</button>
                </div>
            </form>

            <p class="login-link mt-3">
                Já tem conta? <a href="../html/login.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
