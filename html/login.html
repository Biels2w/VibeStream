<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VibeStream</title>
    <link rel="icon" href="../icons/icon-site.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/login.css" />
</head>

<body class="d-flex justify-content-center align-items-center">
    <div class="login-container d-flex justify-content-center w-100">
        <div class="login-box">
            <h1>VibeStream 🎧</h1>
            <p>Entre na sua vibe</p>

            <form>
                <input type="text" placeholder="Usuário" required />
                <input type="password" placeholder="Senha" required />
                <button type="submit">Entrar</button>
            </form>

            <p class="cadastro">
                Não tem conta? <a href="../html/registro.html">Cadastre-se</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
