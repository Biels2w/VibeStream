<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream</title>
    <meta name="description" content="Uma experiência musical imersiva com estilo, tecnologia e a sua vibe.">
    <link rel="icon" href="../icons/icon-site.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/home-page.css">
</head>

<body>
    <header class="w-100 d-flex align-items-center">

        <div class="texto-logo d-flex align-items-center gap-3">
            <img src="../imagens/VibeStream-logofinal.png" alt="Logo do app" width="120" height="95">
            <h2>Vibe<br><span>Stream</span></h2>
        </div>

        <nav class="navegacao-header d-flex align-items-center gap-3 flex-grow-1 justify-content-center d-inline-block">
            <a href="../html/home-page.html" aria-label="Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="home"
                    viewBox="0 0 16 16">
                    <path
                        d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z" />
                </svg>
            </a>

            <form class="barra-busca d-flex align-items-center">
                <input type="text" placeholder="Busque pela sua vibe...">
                <button class="botao-busca d-flex align-items-center" type="submit" aria-label="Buscar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        class="lupa align-items-center" viewBox="0 0 16 16">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg>
                </button>
            </form>


            <a href="#" aria-label="explorar">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="Explorar"
                    viewBox="0 0 16 16">
                    <path
                        d="M2 3a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 0-1h-11A.5.5 0 0 0 2 3m2-2a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 0-1h-7A.5.5 0 0 0 4 1m2.765 5.576A.5.5 0 0 0 6 7v5a.5.5 0 0 0 .765.424l4-2.5a.5.5 0 0 0 0-.848z" />
                    <path
                        d="M1.5 14.5A1.5 1.5 0 0 1 0 13V6a1.5 1.5 0 0 1 1.5-1.5h13A1.5 1.5 0 0 1 16 6v7a1.5 1.5 0 0 1-1.5 1.5zm13-1a.5.5 0 0 0 .5-.5V6a.5.5 0 0 0-.5-.5h-13A.5.5 0 0 0 1 6v7a.5.5 0 0 0 .5.5z" />
                </svg>
            </a>
        </nav>

        <a href="../html/login.html" class="login" aria-label="Login">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="login-circle"
                viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                <path fill-rule="evenodd"
                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
            </svg>
        </a>
    </header>

    <main>
        <section class="banner position-relative d-flex">
            <div
                class="fundo-banner position-absolute d-flex align-items-center justify-content-between flex-wrap gap-3">
                <div class="banner-esquerda d-flex flex-column gap-3">
                    <div class="texto-banner">
                        <h2 class="d-inline-block">Aqui você<br>encontra<br><span>sua VIBE</span></h2>
                    </div>
                    <div class="subtexto-banner">
                        <p>Milhões de músicas. Playlists incríveis. Artistas que você ama <br>— tudo em um só lugar.</p>
                    </div>

        </section>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="home-page.js"></script>
</body>

</html>
